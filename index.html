<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REACTOR 13</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BOOT SCREEN -->
<div id="screen-boot" class="screen active">
  <div class="boot-wrap">
    <div class="rad-icon">☢</div>
    <h1 class="logo">REACTOR<span>13</span></h1>
    <p class="subtitle">CLASSIFIED INVESTIGATION — FILE 1997-R13</p>
    <div class="boot-log" id="boot-log"></div>
    <button class="btn-start hidden" id="btn-start">[ ENTER FACILITY ]</button>
  </div>
  <div class="scanlines"></div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen hidden">

  <!-- TOP HUD -->
  <div id="hud">
    <div id="hud-room">SECTOR UNKNOWN</div>
    <div id="hud-center">
      <span id="hud-mission"></span>
    </div>
    <div id="hud-right">
      <span class="hud-lbl">LIGHT</span>
      <div id="battery-bar"><div id="battery-fill"></div></div>
    </div>
  </div>

  <!-- GAME CANVAS -->
  <canvas id="gc"></canvas>

  <!-- OVERLAYS -->
  <div id="overlay-dark"></div>
  <div id="overlay-flicker"></div>
  <div id="overlay-vignette"></div>
  <div id="overlay-flashlight"></div>

  <!-- ENTITY SCARE -->
  <div id="entity-scare" class="hidden">
    <div id="entity-shape"></div>
  </div>

  <!-- INTERACTION PANEL -->
  <div id="interact-hint" class="hidden">[E] <span id="interact-label">EXAMINE</span></div>

  <!-- LOG READER -->
  <div id="log-panel" class="hidden">
    <div class="log-inner">
      <div class="log-title" id="log-title">LOG</div>
      <div class="log-stamp">CLASSIFIED</div>
      <div class="log-body" id="log-body"></div>
      <button class="btn-close" id="btn-close-log">[CLOSE]</button>
    </div>
  </div>

  <!-- MISSION POPUP -->
  <div id="mission-popup" class="hidden">
    <div class="mission-inner">
      <div class="mission-tag">MISSION UPDATE</div>
      <div id="mission-popup-text"></div>
    </div>
  </div>

  <!-- CHOICE PANEL -->
  <div id="choice-panel" class="hidden">
    <div class="choice-inner">
      <div id="choice-text"></div>
      <div id="choice-btns"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="controls-bar">WASD — MOVE &nbsp;|&nbsp; E — INTERACT &nbsp;|&nbsp; F — FLASHLIGHT</div>

  <div class="scanlines"></div>
</div>

<!-- ENDING SCREEN -->
<div id="screen-end" class="screen hidden">
  <div class="end-wrap">
    <div class="rad-icon end-rad">☢</div>
    <h2 id="end-title"></h2>
    <div id="end-text"></div>
    <div id="end-tag"></div>
    <button class="btn-start" id="btn-restart">[RESTART INVESTIGATION]</button>
  </div>
  <div class="scanlines"></div>
</div>

<script src="script.js"></script>
</body>
</html>
